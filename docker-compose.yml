version: "3.9"

services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-game-engine
    ports:
      - "6379:6379" # Redis
      - "8001:8001" # RedisInsight (browser UI — useful for debugging)
    volumes:
      - redis-data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    restart: unless-stopped

volumes:
  redis-data:
